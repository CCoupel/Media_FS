<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Media_FS — Configuration</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    header { background: #1a1d2e; border-bottom: 1px solid #2d3748; padding: 1rem 2rem; display: flex; align-items: center; gap: .75rem; }
    header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: .02em; }
    header .badge { font-size: .7rem; background: #3b82f6; color: #fff; padding: .15rem .5rem; border-radius: 999px; }
    main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
    section { margin-bottom: 2.5rem; }
    h2 { font-size: .85rem; text-transform: uppercase; letter-spacing: .08em; color: #94a3b8; margin-bottom: 1rem; }
    .card { background: #1a1d2e; border: 1px solid #2d3748; border-radius: .75rem; overflow: hidden; }
    .server-row { display: flex; align-items: center; gap: 1rem; padding: .9rem 1.25rem; border-bottom: 1px solid #2d3748; }
    .server-row:last-child { border-bottom: none; }
    .server-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; flex-shrink: 0; }
    .icon-jellyfin { background: #7b2ccc; }
    .icon-emby     { background: #52b54b; }
    .icon-plex     { background: #e5a00d; color: #000; }
    .server-info { flex: 1; min-width: 0; }
    .server-name { font-weight: 600; font-size: .95rem; }
    .server-url  { font-size: .8rem; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status-dot  { width: 8px; height: 8px; border-radius: 50%; background: #64748b; flex-shrink: 0; }
    .status-dot.ok  { background: #22c55e; }
    .status-dot.err { background: #ef4444; }
    .btn { cursor: pointer; border: none; border-radius: .4rem; padding: .4rem .9rem; font-size: .8rem; font-weight: 500; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-ghost  { background: transparent; border: 1px solid #334155; color: #94a3b8; }
    .btn-danger { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-sm { padding: .25rem .6rem; font-size: .75rem; }

    /* Add server form */
    .add-form { padding: 1.25rem; display: none; }
    .add-form.open { display: block; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    label { font-size: .8rem; color: #94a3b8; display: block; margin-bottom: .25rem; }
    input, select { width: 100%; background: #0f1117; border: 1px solid #334155; border-radius: .4rem; color: #e2e8f0; padding: .45rem .75rem; font-size: .85rem; }
    input:focus, select:focus { outline: none; border-color: #2563eb; }
    .form-actions { display: flex; gap: .5rem; margin-top: 1rem; justify-content: flex-end; }
    .notice { font-size: .8rem; color: #22c55e; margin-top: .5rem; display: none; }
    .notice.error { color: #f87171; }

    /* General settings */
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; padding: 1.25rem; }
    .save-bar { position: sticky; bottom: 0; background: #1a1d2e; border-top: 1px solid #2d3748; padding: .75rem 1.5rem; display: flex; justify-content: flex-end; gap: .75rem; }
  </style>
</head>
<body>

<header>
  <span style="font-size:1.4rem">🎬</span>
  <h1>Media_FS</h1>
  <span class="badge">Configuration</span>
</header>

<main>

  <!-- Servers -->
  <section>
    <h2>Serveurs configurés</h2>
    <div class="card">
      <div id="server-list">
        {{range .Servers}}
        <div class="server-row" data-alias="{{.Alias}}">
          <div class="server-icon icon-{{.Type}}">{{slice (printf "%s" .Type) 0 1 | upper}}</div>
          <div class="server-info">
            <div class="server-name">{{.Username}}@{{.Alias}}</div>
            <div class="server-url">{{.URL}}</div>
          </div>
          <span class="status-dot" id="dot-{{.Alias}}"></span>
          <button class="btn btn-ghost btn-sm" onclick="testServer('{{.Alias}}','{{.URL}}','{{.Type}}','{{.Username}}','{{.APIKey}}')">Tester</button>
          <button class="btn btn-danger btn-sm" onclick="removeServer('{{.Alias}}')">Retirer</button>
        </div>
        {{else}}
        <div style="padding:1.5rem;text-align:center;color:#475569;font-size:.85rem">
          Aucun serveur configuré. Ajoutez-en un ci-dessous.
        </div>
        {{end}}
      </div>

      <!-- Add form -->
      <div id="add-form" class="add-form">
        <div class="form-grid">
          <div>
            <label>Type de serveur</label>
            <select id="f-type">
              <option value="jellyfin">Jellyfin</option>
              <option value="emby">Emby</option>
              <option value="plex">Plex</option>
            </select>
          </div>
          <div>
            <label>Alias (nom affiché)</label>
            <input id="f-alias" type="text" placeholder="HomeServer">
          </div>
          <div style="grid-column:1/-1">
            <label>URL du serveur</label>
            <input id="f-url" type="url" placeholder="http://192.168.1.10:8096">
          </div>
          <div>
            <label>Nom d'utilisateur</label>
            <input id="f-user" type="text" placeholder="cyril">
          </div>
          <div>
            <label>Clé API</label>
            <input id="f-key" type="password" placeholder="xxxxxxxxxxxxxxxx">
          </div>
        </div>
        <div class="form-actions">
          <span id="add-notice" class="notice"></span>
          <button class="btn btn-ghost" onclick="toggleAddForm()">Annuler</button>
          <button class="btn btn-ghost btn-sm" onclick="testFormServer()">Tester la connexion</button>
          <button class="btn btn-primary" onclick="addServer()">Ajouter</button>
        </div>
      </div>

      <div style="padding:.75rem 1.25rem; border-top:1px solid #2d3748">
        <button class="btn btn-ghost" onclick="toggleAddForm()">+ Ajouter un serveur</button>
      </div>
    </div>
  </section>

  <!-- General settings -->
  <section>
    <h2>Paramètres généraux</h2>
    <div class="card">
      <div class="settings-grid">
        <div>
          <label>Lettre de lecteur (Windows)</label>
          <input id="s-drive" type="text" value="{{.MountConfig.DriveLetter}}" maxlength="1">
        </div>
        <div>
          <label>Point de montage (Linux)</label>
          <input id="s-mount" type="text" value="{{.MountConfig.MountPoint}}">
        </div>
        <div>
          <label>Chunks parallèles (téléchargement)</label>
          <input id="s-chunks" type="number" min="1" max="16" value="{{.Download.ParallelChunks}}">
        </div>
        <div>
          <label>Taille chunk (MB)</label>
          <input id="s-chunksize" type="number" min="8" max="512" value="{{.Download.ChunkSizeMB}}">
        </div>
      </div>
    </div>
  </section>

</main>

<div class="save-bar">
  <span id="save-notice" class="notice"></span>
  <button class="btn btn-primary" onclick="saveConfig()">Enregistrer et appliquer</button>
</div>

<script>
function toggleAddForm() {
  const f = document.getElementById('add-form');
  f.classList.toggle('open');
}

async function addServer() {
  const body = {
    alias:    document.getElementById('f-alias').value,
    type:     document.getElementById('f-type').value,
    url:      document.getElementById('f-url').value,
    username: document.getElementById('f-user').value,
    api_key:  document.getElementById('f-key').value,
    enabled:  true
  };
  const r = await fetch('/api/servers/add', {method:'POST', body: JSON.stringify(body)});
  if (r.ok) { location.reload(); } else { showNotice('add-notice', 'Erreur lors de l\'ajout', true); }
}

async function removeServer(alias) {
  if (!confirm('Retirer ' + alias + ' ?')) return;
  const r = await fetch('/api/servers/remove', {method:'POST', body: JSON.stringify({Alias: alias})});
  if (r.ok) { location.reload(); }
}

async function testServer(alias, url, type, username, apiKey) {
  const dot = document.getElementById('dot-' + alias);
  dot.className = 'status-dot';
  const r = await fetch('/api/servers/test', {method:'POST', body: JSON.stringify({alias, url, type, username, api_key: apiKey})});
  dot.className = 'status-dot ' + (r.ok ? 'ok' : 'err');
}

async function testFormServer() {
  const body = {
    alias:    document.getElementById('f-alias').value,
    type:     document.getElementById('f-type').value,
    url:      document.getElementById('f-url').value,
    username: document.getElementById('f-user').value,
    api_key:  document.getElementById('f-key').value,
  };
  const r = await fetch('/api/servers/test', {method:'POST', body: JSON.stringify(body)});
  const n = document.getElementById('add-notice');
  n.style.display = 'inline';
  if (r.ok) { n.textContent = '✓ Connexion réussie'; n.className = 'notice'; }
  else       { n.textContent = '✗ Connexion échouée'; n.className = 'notice error'; }
}

async function saveConfig() {
  const r = await fetch('/api/save', {method:'POST'});
  const n = document.getElementById('save-notice');
  n.style.display = 'inline';
  if (r.ok) { n.textContent = '✓ Configuration enregistrée'; n.className = 'notice'; }
  else       { n.textContent = '✗ Erreur de sauvegarde'; n.className = 'notice error'; }
  setTimeout(() => { n.style.display = 'none'; }, 3000);
}
</script>
</body>
</html>
